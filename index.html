<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Say Tienda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
padding:20px;
text-align:center;
}

header img{
height:80px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
}

.info{
padding:15px;
}

.old{
text-decoration:line-through;
color:gray;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#333;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
}

.modal-content{
background:white;
margin:5% auto;
padding:20px;
width:80%;
max-width:600px;
border-radius:10px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.gallery img{
width:100%;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>

<img src="logo.png">

</header>

<div class="grid">


<div class="card" onclick="openProduct('blackred')">

<img src="blackred1.jpg">

<div class="info">

<h3>Jordan Retro 1 Black Red</h3>

<span class="old">$89.990</span>

<div class="price">$59.990</div>

<button>Ver producto</button>

</div>

</div>


<div class="card" onclick="openProduct('gold')">

<img src="gold1.jpg">

<div class="info">

<h3>Jordan Retro 1 Black White Gold</h3>

<span class="old">$89.990</span>

<div class="price">$69.990</div>

<button>Ver producto</button>

</div>

</div>


<div class="card" onclick="openProduct('patent')">

<img src="patent1.jpg">

<div class="info">

<h3>Jordan Retro 1 Patent Red</h3>

<span class="old">$89.990</span>

<div class="price">$59.990</div>

<button>Ver producto</button>

</div>

</div>


<div class="card" onclick="openProduct('space')">

<img src="space1.jpg">

<div class="info">

<h3>Jordan Retro 1 Space Jam</h3>

<span class="old">$89.990</span>

<div class="price">$69.990</div>

<button>Ver producto</button>

</div>

</div>


</div>



<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<div id="product-content"></div>

</div>

</div>



<script>

function openProduct(product){

let content=""

if(product=="blackred"){

content=`

<div class="gallery">

<img src="blackred1.jpg">
<img src="blackred2.jpg">
<img src="blackred3.jpg">
<img src="blackred4.jpg">

</div>

<p>Tallas 40 al 44 disponibles</p>

<button onclick="buy()">Comprar en Instagram</button>

`

}


if(product=="gold"){

content=`

<div class="gallery">

<img src="gold1.jpg">
<img src="gold2.jpg">
<img src="gold3.jpg">
<img src="gold4.jpg">

</div>

<p>Tallas 40 al 44 disponibles</p>

<button onclick="buy()">Comprar en Instagram</button>

`

}


if(product=="patent"){

content=`

<div class="gallery">

<img src="patent1.jpg">
<img src="patent2.jpg">
<img src="patent3.jpg">
<img src="patent4.jpg">

</div>

<p>Tallas 40 al 44 disponibles</p>

<button onclick="buy()">Comprar en Instagram</button>

`

}


if(product=="space"){

content=`

<div class="gallery">

<img src="space1.jpg">
<img src="space2.jpg">
<img src="space3.jpg">
<img src="space4.jpg">
<img src="space5.jpg">

</div>

<p>Tallas 35 al 44.5 disponibles</p>

<button onclick="buy()">Comprar en Instagram</button>

`

}


document.getElementById("product-content").innerHTML=content

document.getElementById("modal").style.display="block"

}


function closeModal(){

document.getElementById("modal").style.display="none"

}


function buy(){

window.open("https://www.instagram.com/saytienda/")

}

</script>


</body>

</html>
