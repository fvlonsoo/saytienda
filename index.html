<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>SayTienda</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

/* colores */

:root{
--color-principal:#5ce1e6;
--color-secundario:#9b5cff;
}

/* base */

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
}

/* HEADER */

.navbar{
display:flex;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
}

.logo{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
height:60px;
}

.instagram-btn{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
}

.instagram-btn img{
height:32px;
cursor:pointer;
transition:.2s;
}

.instagram-btn img:hover{
transform:scale(1.1);
}

.header-text{
text-align:center;
}

.titulo{
font-size:32px;
font-family:'Orbitron',sans-serif;
letter-spacing:2px;

background:linear-gradient(90deg,var(--color-principal),var(--color-secundario));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* trust text */

.trust-bar{
margin-top:10px;
font-size:16px;
text-align:center;
}

.trust-bar.small{
font-size:14px;
opacity:.8;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:#111;
border-radius:12px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.info{
padding:15px;
display:flex;
flex-direction:column;
flex-grow:1;
}

.old{
text-decoration:line-through;
color:gray;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

.info button{
margin-top:auto;
}

/* BOTÓN */

button{
background:linear-gradient(90deg,#5ce1e6,#9b5cff);
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
border-radius:6px;
}

button:hover{
opacity:.85;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,.8);
overflow:auto;
}

.modal-content{
background:white;
color:black;
max-width:600px;
margin:40px auto;
padding:20px;
border-radius:10px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.gallery img{
width:100%;
max-width:500px;
display:block;
margin:10px auto;
border-radius:10px;
}

</style>

</head>

<body>


<header class="navbar">

<img src="logo.png" class="logo">

<a href="https://www.instagram.com/saytienda" target="_blank" class="instagram-btn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<div class="header-text">

<h1 class="titulo">SayTienda</h1>

<div class="trust-bar">
Desde 2018 · +1400 referencias en historias destacadas de Instagram
</div>

<div class="trust-bar small">
Entrega presencial · Delivery paga al recibir · Envíos a todo Chile
</div>

</div>

</header>


<div class="grid">
